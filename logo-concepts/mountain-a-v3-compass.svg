<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Mountain A with compass rose integrated at the base -->
  <defs>
    <linearGradient id="mtn3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97A3A"/>
      <stop offset="100%" stop-color="#A85A22"/>
    </linearGradient>
  </defs>

  <!-- Mountain A shape -->
  <path d="M64 14 L102 104 L82 104 L72 74 L56 74 L46 104 L26 104 Z" fill="url(#mtn3)"/>

  <!-- A crossbar -->
  <path d="M52 80 L76 80" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Flag -->
  <line x1="64" y1="14" x2="64" y2="4" stroke="#A85A22" stroke-width="2.5"/>
  <path d="M64 4 L78 10 L64 16" fill="#F5D54A"/>

  <!-- Compass circle at base -->
  <circle cx="64" cy="108" r="14" fill="none" stroke="#F5D54A" stroke-width="2"/>

  <!-- Compass needle (N-S) -->
  <path d="M64 96 L67 108 L64 120 L61 108 Z" fill="#F5D54A" opacity="0.8"/>

  <!-- Compass E-W ticks -->
  <line x1="50" y1="108" x2="54" y2="108" stroke="#F5D54A" stroke-width="1.5"/>
  <line x1="74" y1="108" x2="78" y2="108" stroke="#F5D54A" stroke-width="1.5"/>
</svg>