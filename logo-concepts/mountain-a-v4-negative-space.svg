<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Mountain peak where negative space forms the A -->
  <!-- Rounded square background with mountain cutout -->
  <defs>
    <linearGradient id="mtn4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B9B8F"/>
      <stop offset="100%" stop-color="#1E6B62"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#mtn4)"/>

  <!-- Mountain A as negative space (cut out of the background) -->
  <!-- Main triangle -->
  <path d="M64 24 L100 104 L80 104 L72 82 L56 82 L48 104 L28 104 Z" fill="white"/>

  <!-- Crossbar cutback (making the A hole) -->
  <rect x="52" y="84" width="24" height="6" rx="3" fill="url(#mtn4)"/>

  <!-- Flag at peak -->
  <line x1="64" y1="24" x2="64" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M65 12 L80 18 L65 24" fill="#F5D54A"/>
</svg>