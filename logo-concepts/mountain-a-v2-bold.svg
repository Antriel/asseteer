<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Bolder, more geometric mountain A with pennant flag -->
  <defs>
    <linearGradient id="mtn2" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1E5A9E"/>
    </linearGradient>
  </defs>

  <!-- Mountain A - thicker, bolder -->
  <path d="M64 20 L108 112 L88 112 L76 78 L52 78 L40 112 L20 112 Z" fill="url(#mtn2)"/>

  <!-- A crossbar -->
  <rect x="48" y="82" width="32" height="5" rx="2.5" fill="white" opacity="0.5"/>

  <!-- Flag pole from peak -->
  <line x1="64" y1="20" x2="64" y2="4" stroke="#1E5A9E" stroke-width="3" stroke-linecap="round"/>

  <!-- Triangular pennant flag -->
  <path d="M65 4 L82 10 L65 18" fill="#F57A4A"/>

  <!-- Second smaller mountain behind (depth) -->
  <path d="M88 112 L108 60 L120 112 Z" fill="#1E5A9E" opacity="0.3"/>

  <!-- Subtle peak shine -->
  <path d="M64 20 L70 38 L58 38 Z" fill="white" opacity="0.15"/>
</svg>