<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Backpack with magnifying glass tucked in the side pocket -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2E6BB5"/>
    </linearGradient>
  </defs>

  <!-- Carry loop -->
  <path d="M50 22 Q50 12 64 12 Q78 12 78 22" fill="none" stroke="#2E6BB5" stroke-width="5" stroke-linecap="round"/>

  <!-- Main backpack body -->
  <rect x="32" y="26" width="64" height="82" rx="12" fill="url(#bg2)"/>

  <!-- Front pocket -->
  <rect x="38" y="60" width="52" height="34" rx="8" fill="#3A7BC8" stroke="#7BBAF5" stroke-width="1.5"/>

  <!-- Pocket flap line -->
  <path d="M42 62 Q64 68 86 62" fill="none" stroke="#7BBAF5" stroke-width="1.5"/>

  <!-- Shoulder straps -->
  <path d="M32 40 Q24 40 24 50 L24 88 Q24 94 30 94" fill="none" stroke="#265EA0" stroke-width="4" stroke-linecap="round"/>
  <path d="M96 40 Q104 40 104 50 L104 88 Q104 94 98 94" fill="none" stroke="#265EA0" stroke-width="4" stroke-linecap="round"/>

  <!-- Zipper -->
  <line x1="46" y1="42" x2="82" y2="42" stroke="#265EA0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="80" cy="42" r="2.5" fill="#B8D9F5"/>

  <!-- Magnifying glass sticking out from side -->
  <circle cx="96" cy="56" r="14" fill="none" stroke="#F5D54A" stroke-width="4"/>
  <line x1="106" y1="66" x2="118" y2="78" stroke="#F5D54A" stroke-width="5" stroke-linecap="round"/>

  <!-- Lens glare -->
  <path d="M89 49 Q93 45 97 48" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>