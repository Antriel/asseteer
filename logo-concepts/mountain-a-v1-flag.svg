<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Letter A as mountain peak with flag -->
  <defs>
    <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B9B8F"/>
      <stop offset="100%" stop-color="#1E6B62"/>
    </linearGradient>
  </defs>

  <!-- Mountain / letter A shape -->
  <path d="M64 16 L104 108 L84 108 L72 76 L56 76 L44 108 L24 108 Z" fill="url(#mtn1)"/>

  <!-- A crossbar (also looks like a snow line) -->
  <path d="M52 82 L76 82" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Flag pole extending from peak -->
  <line x1="64" y1="16" x2="64" y2="6" stroke="#1E6B62" stroke-width="2.5"/>

  <!-- Flag -->
  <path d="M64 6 L84 14 L64 22" fill="#F5D54A"/>

  <!-- Snow cap / peak highlight -->
  <path d="M64 16 L72 36 L56 36 Z" fill="white" opacity="0.2"/>
</svg>