<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Ultra-minimal: backpack outline merging with magnifying glass -->
  <!-- The whole backpack is seen "through" a magnifying glass -->

  <!-- Backpack body - simple rounded shape -->
  <rect x="34" y="30" width="60" height="72" rx="16" fill="#2D8B78" />

  <!-- Carry loop -->
  <path d="M52 28 Q52 16 64 16 Q76 16 76 28" fill="none" stroke="#2D8B78" stroke-width="5" stroke-linecap="round"/>

  <!-- Two strap bumps at bottom -->
  <circle cx="44" cy="102" r="5" fill="#24735F"/>
  <circle cx="84" cy="102" r="5" fill="#24735F"/>

  <!-- Central magnifying glass icon (white, overlaid) -->
  <circle cx="64" cy="64" r="18" fill="none" stroke="white" stroke-width="4"/>
  <line x1="77" y1="77" x2="92" y2="92" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Subtle star/sparkle inside the lens to suggest "discovery" -->
  <path d="M64 54 L66 61 L73 61 L67 66 L69 73 L64 68 L59 73 L61 66 L55 61 L62 61 Z" fill="white" opacity="0.4"/>
</svg>